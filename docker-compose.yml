x-backend-common: &backend-common
  image: opensources-rating-backend:latest
  build:
    context: ./backend
    dockerfile: Dockerfile
  environment:
    DATABASE_URL: postgresql+asyncpg://oss_rating:${POSTGRES_PASSWORD:-oss_rating_dev}@db:5432/oss_rating
    REDIS_URL: redis://redis:6379/0
    GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
    EMAIL_DELIVERY_MODE: ${EMAIL_DELIVERY_MODE:-log}
    EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-OSS Market}
    EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-no-reply@example.com}
    SMTP_HOST: ${SMTP_HOST:-}
    SMTP_PORT: ${SMTP_PORT:-587}
    SMTP_USERNAME: ${SMTP_USERNAME:-}
    SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  volumes:
    - ./backend:/app

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oss_rating
      POSTGRES_USER: oss_rating
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oss_rating_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oss_rating"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    <<: *backend-common
    ports:
      - "8000:8000"
    command:
      - sh
      - -c
      - python scripts/bootstrap_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  celery-worker:
    <<: *backend-common
    depends_on:
      backend:
        condition: service_healthy
    command: celery -A app.jobs.celery_app worker --loglevel=info

  celery-beat:
    <<: *backend-common
    depends_on:
      backend:
        condition: service_healthy
    command: celery -A app.jobs.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # 브라우저는 http://localhost:3000/api/... 로 호출 → Next 리라이트로 backend 컨테이너로 전달
      BACKEND_INTERNAL_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next-dev

volumes:
  pgdata:
